<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Linked List Visualizer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .node {
            display: flex;
            align-items: center;
        }

        .node-box {
            background: #f8f9fa;
            padding: 10px 15px;
            border: 2px solid #333;
            border-radius: 8px;
            margin: 5px;
            font-weight: bold;
        }

        .arrow {
            font-size: 20px;
            margin: 0 5px;
        }

        .head {
            background: red;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            position: absolute;
            top: -15px;
            left: 10px;
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="card p-4 shadow">

            <h3 class="text-center mb-4">🔗 Linked List Visualizer</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="row">

                    <div class="col-md-12 mb-3">
                        <input type="text" name="node_value" class="form-control" placeholder="Enter node value">
                        <input type="number" name="position" class="form-control mb-2" placeholder="Enter last node  for adding at middle">
                    </div>

                    <div class="col-md-3">
                        <button class="btn btn-success w-100" type="submit" formaction="{% url 'add_node' %}">
                            Insert End
                        </button>
                    </div>

                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" type="submit" formaction="{% url 'insert_at_beg' %}">
                            Insert Beginning
                        </button>
                    </div>

                    <div class="col-md-3">
                        <button class="btn btn-warning w-100" type="submit" formaction="{% url 'insert_at_mid' %}">
                            Insert Middle
                        </button>
                    </div>

                    <div class="col-md-3">
                        <button class="btn btn-danger w-100" type="submit" formaction="{% url 'delete_node' %}">
                            Delete
                        </button>
                    </div>

                </div>

            </form>

            <hr>

            <div class="d-flex flex-wrap align-items-center mt-4">

                {% if nodes %}

                {% for node in nodes %}

                <div class="node position-relative">

                    {% if forloop.first %}
                    <div class="head">HEAD</div>
                    {% endif %}

                    <div class="node-box">{{node}}</div>

                </div>

                <div class="arrow">→</div>

                {% endfor %}

                <div class="node-box bg-secondary text-white">NULL</div>

                {% else %}

                <p>No nodes yet</p>

                {% endif %}

            </div>

        </div>

    </div>

</body>

</html>
